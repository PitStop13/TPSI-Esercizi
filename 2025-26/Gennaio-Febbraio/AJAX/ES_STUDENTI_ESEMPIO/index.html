<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Gestione Studenti</title>
    <!-- Bootstrap online (da sostituire con locale prima della verifica) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container-fluid mt-4 px-4">

    <h1 class="text-center mb-4">📚 Gestione Studenti</h1>

    <!-- Alert feedback (nascosto di default) -->
    <div id="divAlert" class="alert d-none mb-3" role="alert"></div>

    <!-- ===== FORM INSERIMENTO / MODIFICA ===== -->
    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-success text-white">
            <h5 class="mb-0" id="titoloForm">➕ Inserisci nuovo studente</h5>
        </div>
        <div class="card-body">
            <input type="hidden" id="txtId">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label fw-bold">Nome</label>
                    <input type="text" id="txtNome" class="form-control" placeholder="es. Filippo">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">Cognome</label>
                    <input type="text" id="txtCognome" class="form-control" placeholder="es. Rossi">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">Classe</label>
                    <input type="text" id="txtClasse" class="form-control" placeholder="es. 3B">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">Voto (1-10)</label>
                    <input type="number" id="txtVoto" class="form-control" min="1" max="10" placeholder="es. 8">
                </div>
            </div>
            <div class="mt-3 d-flex gap-2">
                <button class="btn btn-success" id="btnInserisci" onclick="inserisciStudente()">
                    💾 Inserisci
                </button>
                <button class="btn btn-warning d-none" id="btnAggiorna" onclick="aggiornaStudente()">
                    ✏️ Aggiorna
                </button>
                <button class="btn btn-secondary d-none" id="btnAnnulla" onclick="annullaModifica()">
                    ✖ Annulla
                </button>
            </div>
        </div>
    </div>

    <!-- ===== TABELLA + GRAFICI in due colonne ===== -->
    <div class="row">

        <!-- Colonna sinistra: Tabella -->
        <div class="col-lg-7">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">📋 Lista Studenti</h5>
                    <button class="btn btn-light btn-sm" onclick="leggiStudenti()">🔄 Ricarica</button>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover table-striped mb-0">
                            <thead class="table-dark">
                                <tr>
                                    <th>ID</th>
                                    <th>Nome</th>
                                    <th>Cognome</th>
                                    <th>Classe</th>
                                    <th>Voto</th>
                                    <th>Azioni</th>
                                </tr>
                            </thead>
                            <tbody id="tbodyStudenti"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Colonna destra: Grafici -->
        <div class="col-lg-5">
            <!-- Grafico 1: Studenti per classe (barre) -->
            <div class="card shadow-sm mb-3">
                <div class="card-header bg-primary text-white">
                    <h6 class="mb-0">📊 Studenti per Classe</h6>
                </div>
                <div class="card-body">
                    <canvas id="canvasClassi"></canvas>
                </div>
            </div>
            <!-- Grafico 2: Distribuzione voti (ciambella) -->
            <div class="card shadow-sm">
                <div class="card-header bg-info text-white">
                    <h6 class="mb-0">🍩 Distribuzione Voti</h6>
                </div>
                <div class="card-body">
                    <canvas id="canvasVoti"></canvas>
                </div>
            </div>
        </div>

    </div><!-- fine row -->
</div><!-- fine container -->

<!-- jQuery LOCALE -->
<script src="../jquery.js"></script>
<!-- Bootstrap 5 JS online (da sostituire con locale prima della verifica) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Chart.js LOCALE -->
<script src="../chart.js"></script>
<!-- Libreria riutilizzabile -->
<script src="libreria.js"></script>
<!-- Logica esercizio -->
<script src="index.js"></script>
</body>
</html>
