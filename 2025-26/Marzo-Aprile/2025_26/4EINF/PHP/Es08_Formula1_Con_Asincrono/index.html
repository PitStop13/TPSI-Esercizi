<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <script src="js/index.js"></script>
    <title>Formula 1</title>
</head>
<body>
<div class="container">
    <h1 class="text-center m-4">Formula 1</h1>
    <div class="bg-light p-1 m-2">
        <div class="row mt-4">
            <div class="col-sm-4 mx-auto text-center ">
                <label class="h4">Gare</label>
                <select name="selectRace" id="selectRace" class="form-select"></select>
            </div>
        </div>
        <div class="row mt-4">
            <div class="col-sm-10 mx-auto text-center">
                <table class="table table-striped">
                    <thead>
                    <tr>
                        <th>Nome Gara</th>
                        <th>Data Gara</th>
                        <th>Nome Circuito</th>
                        <th>Nazione Circuito</th>
                        <th>Team</th>
                        <th>Pilota</th>
                        <th>Punteggio</th>
                    </tr>
                    </thead>
                    <tbody id="content_Race"></tbody>
                </table>
            </div>
        </div>
    </div>
    <div class="bg-light p-1 m-2">
        <div class="row mt-4">
            <div class="col-sm-4 mx-auto text-center">
                <label class="h4">Team</label>
                <select name="selectTeam" id="selectTeam" class="form-select"></select>
            </div>
        </div>
        <div class="row mt-4">
            <div class="col-sm-10 mx-auto text-center">
                <table class="table table-striped">
                    <thead>
                    <tr>
                        <th>Team</th>
                        <th>Pilota</th>
                        <th>Nazionalità</th>
                        <th>Data di nascita</th>
                    </tr>
                    </thead>
                    <tbody id="content_Team"></tbody>
                </table>
            </div>
        </div>
    </div>
    <div class="bg-light p-1 m-2">
        <div class="row mt-4">
            <h4 class="text-center" style="margin-bottom: 18px;" >Punteggi Pilota</h4>
            <div class="col-sm-10 mx-auto text-center">
                <table class="table table-striped">
                    <thead>
                    <tr>
                        <th>Pilota</th>
                        <th>Punteggio totale</th>
                    </tr>
                    </thead>
                    <tbody id="content_Driver"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
